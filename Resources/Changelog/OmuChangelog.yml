- author: Pon, Annie
  changes:
    - type: Remove
      message: >-
        Removed the belt slot in loadout options for the BSO, due to the new
        support kits.
    - type: Remove
      message: >-
        Removed the compact defibrillator from BSO's locker, to focus on more
        extraction based gameplay.
    - type: Add
      message: >-
        Added 2 new set selectors for the BSO, which replace the previous weapon
        one. 1 contains all the weapons the previous one did, the other
        containing 3 different support options to choose from. They all come
        with a unique belt slot items, allowing for better readability for all
        players.
    - type: Add
      message: >-
        Added the bluespace fultons and bluespace fultons beacon. These CC ID
        locked fultons are applied in half the time of a normal fulton, extract
        in 5 seconds and announce extraction on medical radio. Contained in the
        Extraction set alongside the pill combat medkit and extraction rig, able
        to store any 2x2 or smaller item.
    - type: Add
      message: >-
        Added the bluespace body bag, a unique body bag which can hold up to 30
        bodies, body parts and/or organs. Contained in the Medical set alongside
        a compact defibrillator, 2 combat medkits and medical chest rig.
    - type: Add
      message: >-
        Added the Chemical set, similiar to the old medical kit. Contains the
        combat injector, T4 chems, omnizine and artiplates vials. Comes in the
        medical pouch.
    - type: Add
      message: >-
        Added the bluespace and bluespace stasis rollerbeds into the BSO's
        locker. Both are 1x2 items when folded, with the stasis one also
        functioning like a stasis bed on buckle. 
    - type: Tweak
      message: >-
        Changed the item pool for BSO's locker to contain the two new set
        selectors instead of the old weapon one, and a disabler for those who
        choose a offensive kit without a nonlethal option. 
    - type: Tweak
      message: >-
        Added a second nonlethal (disabling) speedloader to the shoulder holster
        that the EG-4 comes with.
